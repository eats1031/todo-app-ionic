<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Mis Tareas</ion-title>
    <ion-buttons slot="end">
      <ion-button routerLink="/category-manager">
        <ion-icon slot="icon-only" name="pricetags-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <!-- Estadísticas (controladas por feature flag de Remote Config) -->
  <div *ngIf="showStatistics" class="stats-panel">
    <div class="stat-card">
      <div class="stat-value">{{ totalTasks }}</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">{{ completedTasks }}</div>
      <div class="stat-label">Completadas</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">{{ pendingTasks }}</div>
      <div class="stat-label">Pendientes</div>
    </div>
  </div>

  <ion-segment (ionChange)="filterByCategory($any($event).detail.value)" value="">
    <ion-segment-button value="">
      <ion-label>Todas</ion-label>
    </ion-segment-button>
    <ion-segment-button *ngFor="let cat of categories" [value]="cat.id">
      <ion-label>{{ cat.name }}</ion-label>
    </ion-segment-button>
  </ion-segment>

  <ion-list>
    <ion-item *ngFor="let task of tasks" [class.completed]="task.completed">
      <ion-checkbox
        slot="start"
        [checked]="task.completed"
        (ionChange)="toggleComplete(task)">
      </ion-checkbox>

      <ion-label>
        <h2>{{ task.title }}</h2>
        <p *ngIf="task.categoryId">
          <ion-badge [style.background]="getCategoryColor(task.categoryId)">
            {{ getCategoryName(task.categoryId) }}
          </ion-badge>
        </p>
      </ion-label>

      <ion-button slot="end" fill="clear" color="danger" (click)="deleteTask(task)">
        <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
      </ion-button>
    </ion-item>

    <ion-item *ngIf="tasks.length === 0">
      <ion-label class="ion-text-center" color="medium">
        No hay tareas. ¡Agrega una!
      </ion-label>
    </ion-item>
  </ion-list>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="addTask()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
